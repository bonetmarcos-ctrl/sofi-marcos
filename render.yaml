services:
  - type: web
    name: sofi-marqui
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: ./apps/api/data/state.json
      - key: DATABASE_URL
        sync: false