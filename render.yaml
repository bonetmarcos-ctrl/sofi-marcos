services:
  - type: web
    name: sofi-marqui
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: ./apps/api/data/state.json
      - key: DATABASE_URL
        sync: false
      - key: AUTH_USERNAME
        value: admin
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false